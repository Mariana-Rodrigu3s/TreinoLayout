<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
     <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>


    <link rel="stylesheet" href="./styles.css">

</head>
<body class="d-flex flex-column min-vh-100">
            <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">

        <div class="container">

            <a class="navbar-brand" href="#">Bootstrap Componentes</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuNavbar">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="menuNavbar">

                <ul class="navbar-nav ms-auto">

                    <li class="nav-item">
                        <a class="nav-link" href="#">Home</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#">Sobre</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#"> Contato</a>
                    </li>
                </ul>
            </div>
        </div>

    </nav>

    <!-- CARROSSEL -->

    <section class="container flex-grow-1 d-flex align-items-center">

        <div id="carouselBootstrap" class="carousel slide w-100">

            <div class="carousel-inner rounded shadow">

                <div class="carousel-item active">
                    <img src="https://picsum.photos/1200/400?random=1" class="d-block w-100" alt="Imagem 01">
                </div>

                <div class="carousel-item">
                    <img src="https://picsum.photos/1200/400?random=2" class="d-block w-100" alt="Imagem 02">
                </div>

                <div class="carousel-item">
                    <img src="https://picsum.photos/1200/400?random=3" class="d-block w-100" alt="Imagem 03">
                </div>

            </div>

            <button class="carousel-control-prev" type="button" data-bs-target="#carouselBootstrap" data-bs-slide="prev">
                <span class="carousel-control-prev-icon"></span>
            </button>

            <button class="carousel-control-next" type="button" data-bs-target="#carouselBootstrap" data-bs-slide="next">
                <span class="carousel-control-next-icon"></span>
            </button>
        </div>
    </section>

    <!-- FOOTER -->
     <footer class="bg-dark text-white text-center p-4">
        
     </footer>
    
</body>
</html>
