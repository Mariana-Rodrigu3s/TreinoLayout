<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="styles.css">

    <script src="script.js" defer></script>

    <link rel="stylesheet" href="">

<body class="page">


    <header class="header">
        <h1 class="header__title">Ultimas noticias</h1>
        <div class="header__controls">
            <div class="control-group">
                <label for="color-picker">Cor:</label>
                <input type="color" id="color-picker" class="control-group__input"></input>
            
            </div>

            <div class="control-group"><label for="font-select">Fonte:</label>
                <select id="font-select" class="control-group__select">
                    <option value="Roboto">Roboto</option>
                    <option value="Open Sans">Open Sans</option>
                    <option value="Montserrat">Montserrat</option>
                </select>
            </div>


            <div class="control-group">
                <label for="article-color-picker">Cor dos artigo: </label>
                <input for="" type="color" id="article-color-picker" class="control-group__input"></input>
            </div>

            <button id="theme-toggle" class="header__theme-toggle">
                <span class="material-icons">dark_mode</span>
            </button>
        </div>

    </header>


    <main class="main">
        <article class="news">
            <h2 class="news__title">Avancos recentes em IA</h2>
            <p class="news__content">A inteligencia artificial</p>
        </article>

    </main>

</body>

</html>
