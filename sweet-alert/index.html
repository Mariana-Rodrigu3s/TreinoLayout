<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alertas SweetAlert2</title>

    
    <!-- Bootstrap CSS via CDN CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-SgOJa3DmI69IUzQ2PVdRZhwQ+dy64/BUtbMJw1MZ8t5HZApcHrRKUc4W0kG879m7" crossorigin="anonymous">

    
    <!-- SweetAlert2 CSS via CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11.18.0/dist/sweetalert2.min.css">
    
    <!-- SweetAlert2 JavaScript via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.18.0/dist/sweetalert2.all.min.js" defer></script>
    
    <!-- Bootstrap JS via CDN JS --> 
     <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js" integrity="sha384-k6d4wzSIapyDyv1kpU366/PK5hCdSbCRGRCMv+eplOQJWyd1fbcAu9OCUj5zNLiq" crossorigin="anonymous" defer></script>

    <!-- Script interno para testes da API Sweet -->
    <script src="sweet.js" defer></script>

</head>
<body>
    <div class="container mt-5">
        <h1 class="text-center mb-4">Demonstração dos alertas do sweetalert2</h1>

        <div class="row">
            <!-- Card 1: Alerta Básico -->
            <div class="col-md-4 mb-3">
                <div class="card">
                    <div class="card-header">Alerta Básico</div>
                    <div class="card-body text-center">
                        <button id="alertBasico" class="btn btn-secondary">Exibir Alerta Básico</button>
                    </div>
                </div>
            </div>
            </div>
            <!-- Card 2: Alerta de sucesso -->
            <div class="col-md-4 mb-3">
                <div class="card">
                    <div class="card-header">Alerta de Sucesso</div>
                    <div class="card-body text-center">
                        <button id="alertSucesso" class="btn btn-sucess">Exibir Sucesso</button>
                    </div>
                </div>
            </div>

            <!-- Card 3: Alerta de Erro -->
            <div class="col-md-4 mb-3">
                <div class="card">
                    <div class="card-header">Alerta de Erro</div>
                    <div class="card-body text-center">
                        <button id="alertErro" class="btn btn-danger">Exibir Erro</button>
                    </div>
                </div>
            </div>

            <!-- Card 4: Alerta de Aviso -->
            <div class="col-md-4 mb-3">
                <div class="card">
                    <div class="card-header">Alerta de Aviso</div>
                    <div class="card-body text-center">
                        <button id="alertAviso" class="btn btn-warning">Exibir Aviso</button>
                    </div>
                </div>
            </div>
            <!-- Card 5: Alerta Informativo -->
            <div class="col-md-4 mb-3">
                <div class="card">
                    <div class="card-header">Alerta Informativo</div>
                    <div class="card-body text-center">
                        <button id="alertInfo" class="btn btn-info">Exibir Informativo</button>
                    </div>
                </div>
            </div>
            <!-- Card 6: Alerta de Confirmação -->
            <div class="col-md-4 mb-3">
                <div class="card">
                    <div class="card-header">Alerta de Confirmação</div>
                    <div class="card-body text-center">
                        <button id="alertConfirm" class="btn btn-primary">Exibir Confirmação</button>
                    </div>
                </div>
            </div>
            <!-- Card 7: Alerta com Input -->
            <div class="col-md-4 mb-3">
                <div class="card">
                    <div class="card-header">Alerta com Input</div>
                    <div class="card-body text-center">
                        <button id="alertInput" class="btn btn-dark">Exibir Input</button>
                    </div>
                </div>
            </div>
            <!-- Card 8: Alerta com Timer -->
            <div class="col-md-4 mb-3">
                <div class="card">
                    <div class="card-header">Alerta com Timer</div>
                    <div class="card-body text-center">
                        <button id="alertTimer" class="btn btn-outline-primary">Exibir Timer</button>
                    </div>
                </div>
            </div>
            <!-- Card 9: Alerta com Timer e contagem regressiva -->
            <div class="col-md-4 mb-3">
                <div class="card">
                    <div class="card-header">Alerta com Timer e contagem regressiva</div>
                    <div class="card-body text-center">
                        <button id="alertTimerCount" class="btn btn-outline-primary">Exibir Timer com Contagem Regressiva</button>
                    </div>
                </div>
            </div>
            <!-- Card 10: Alerta com HTML customizado -->
            <div class="col-md-4 mb-3">
                <div class="card">
                    <div class="card-header">Alerta com HTML customizado</div>
                    <div class="card-body text-center">
                        <button id="alertCustomizado" class="btn btn-outline-secondary">Exibir HTML customizado</button>
                    </div>
                </div>
            </div>

        </div>
    </div>
    
</body>
</html>
